# Experiment 2b: ViT-B/16 + 2D conv head, RANDOM INIT, no auxiliary heads
# Control for Exp 2 — isolates the contribution of ImageNet pretraining.
# Same architecture as Exp 2 but weights initialised randomly.

data:
  dataroot: "dataset"
  img_size: 224
  num_workers: 4
  pin_memory: true

model:
  head: conv2d
  aux_heads: []
  pretrained: false
  num_piece_classes: 13
  num_orient_classes: 4

loss:
  w_corners: 0.0
  w_occupancy: 0.0
  w_orient: 0.0

training:
  epochs: 50
  batch_size: 8
  optimizer:
    lr: 1.0e-4
    weight_decay: 1.0e-4
  scheduler:
    t_max: 50
    eta_min: 1.0e-6
  early_stopping:
    patience: 10
  checkpoint:
    save_dir: "checkpoints/exp2b"
    monitor: "val_exact_acc"
    mode: "max"
  mixed_precision: false

inference:
  checkpoint: "checkpoints/exp2b/best_model.pt"
