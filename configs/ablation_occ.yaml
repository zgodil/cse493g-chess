# Ablation: ViT-B/16 + 2D conv head + occupancy head only
# Occupancy labels exist for all 6,479 training images (derived from piece positions),
# making this a clean signal — unlike corners/orientation which cover only ~22%.
# Compare against Exp 2 (no aux) and Exp 3 (all aux) to measure occupancy's contribution.

data:
  dataroot: "dataset"
  img_size: 224
  num_workers: 4
  pin_memory: true

model:
  head: conv2d
  aux_heads: [occupancy]
  pretrained: true
  num_piece_classes: 13
  num_orient_classes: 4

loss:
  w_corners: 0.0
  w_occupancy: 0.1
  w_orient: 0.0

training:
  epochs: 50
  batch_size: 8
  optimizer:
    lr: 1.0e-4
    weight_decay: 1.0e-4
  scheduler:
    t_max: 50
    eta_min: 1.0e-6
  early_stopping:
    patience: 10
  checkpoint:
    save_dir: "checkpoints/ablation_occ"
    monitor: "val_exact_acc"
    mode: "max"
  mixed_precision: false

inference:
  checkpoint: "checkpoints/ablation_occ/best_model.pt"
